name: Refresh SED data

# Triggers:
#   - On any push that changes fetch_sed.py or this workflow (catches the
#     initial deploy so SED data populates without manual intervention).
#   - Monthly via cron (1st of each month, 06:00 UTC).
#   - Manually from the Actions tab → "Run workflow".
on:
  push:
    paths:
      - 'fetch_sed.py'
      - '.github/workflows/refresh-sed.yml'
  schedule:
    - cron: '0 6 1 * *'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: refresh-sed
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run fetch_sed.py
        run: python fetch_sed.py
      - name: Commit and push if changed
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add sed-data
          if git diff --cached --quiet; then
            echo "::notice::No SED changes to commit."
          else
            git commit -m "Refresh SED data ($(date -u +'%Y-%m-%d'))"
            git push
            echo "::notice::SED data updated."
          fi
